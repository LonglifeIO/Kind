<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Window — {{ run_id }}{% block title %}{% endblock %}</title>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
           margin: 0; background: #fbfbf9; color: #1c1c1c; line-height: 1.5; }
    header { background: #1c1c1c; color: #fbfbf9; padding: 0.6rem 1rem; }
    header .run { color: #9c9; font-size: 0.85rem; }
    nav { padding: 0.4rem 1rem; background: #eee; border-bottom: 1px solid #ccc; }
    nav a { margin-right: 1rem; color: #1c1c1c; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    main { padding: 1rem; max-width: 1100px; }
    h1 { font-size: 1.1rem; margin: 0; }
    h2 { font-size: 1rem; border-bottom: 1px solid #ccc; padding-bottom: 0.2rem;
         margin-top: 1.6rem; }
    h3 { font-size: 0.9rem; margin-top: 1.2rem; }
    table { border-collapse: collapse; width: 100%; margin: 0.6rem 0;
            font-size: 0.85rem; }
    th, td { border: 1px solid #ccc; padding: 0.3rem 0.5rem; text-align: left;
             vertical-align: top; }
    th { background: #eee; }
    .kv { display: grid; grid-template-columns: 14rem 1fr; gap: 0.2rem 1rem;
          font-size: 0.9rem; }
    .kv dt { color: #555; }
    .kv dd { margin: 0; }
    .err { background: #fff0f0; border: 1px solid #c99; padding: 0.5rem;
           margin: 0.5rem 0; white-space: pre-wrap; }
    .note { color: #555; font-size: 0.85rem; }
    .verbatim { background: #f4f4ef; border: 1px solid #ddd; padding: 0.5rem;
                white-space: pre-wrap; font-size: 0.85rem; }
    .state { font-weight: bold; }
    .empty { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>Window — read-only viewer</h1>
    <div class="run">run: {{ run_id }}</div>
  </header>
  <nav>
    <a href="{{ url_for('overview') }}">overview</a>
    <a href="{{ url_for('rounds') }}">rounds</a>
    <a href="{{ url_for('audit') }}">audit</a>
    <a href="{{ url_for('admissibility') }}">admissibility</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
